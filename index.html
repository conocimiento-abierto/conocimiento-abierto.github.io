<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-key="pageTitle">Decálogo del Conocimiento Abierto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="controls">
            <button id="btnPrint" data-i18n-key="printButton">🖨️ Imprimir</button>
            <select id="lang-selector" aria-label="Seleccionar idioma"></select>
        </div>
        
        <div class="content-wrapper">
            <header>
                <img src="https://conocimiento-abierto.github.io/abierto_reducido.png" data-i18n-key="logoAlt" alt="Logo de Conocimiento Abierto" class="header-logo" title="Facta, non verba">
                <h1 data-i18n-key="mainTitle"></h1>
            </header>
            
            <div id="content">
                <ol id="decalogue-list"></ol>
                <footer>
                    <p data-i18n-key="footer"></p>
                </footer>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
